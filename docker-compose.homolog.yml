# ===========================================================
# Gestao de Apoio Arquivistico — HOMOLOGACAO
#
# Diferenças em relação à produção (oci):
#   - Nome de containers prefixados com "hml-" para coexistir
#     em VM compartilhada com produção
#   - Volumes nomeados com sufixo "_hml" — NUNCA compartilhados
#     com produção
#   - Porta Nginx: 8080 (bind 127.0.0.1 apenas)
#   - ENVIRONMENT=homolog — habilita logs verbosos no backend
#   - ClamAV desligado por padrão (reduz uso de RAM em VM pequena)
#
# USO:
#   docker compose -f docker-compose.homolog.yml --env-file .env.homolog up -d
#
# JAMAIS use --volumes para não apagar a base de dados.
# ===========================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: hml-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-gestao_arquivistica_hml}
      POSTGRES_USER:     ${POSTGRES_USER:-gestor_hml}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data_hml:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestor_hml} -d ${POSTGRES_DB:-gestao_arquivistica_hml}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hml_internal

  redis:
    image: redis:7-alpine
    container_name: hml-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_hml:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hml_internal

  minio:
    image: minio/minio:latest
    container_name: hml-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin_hml}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data_hml:/data
    # Console disponível apenas via SSH tunnel
    ports:
      - "127.0.0.1:9091:9001"
    networks:
      - hml_internal

  backend:
    build:
      context: ./backend
      target: production
    image: gaa-backend:homolog
    container_name: hml-backend
    restart: unless-stopped
    env_file:
      - .env.homolog
    environment:
      ENVIRONMENT: homolog
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gestor_hml}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-gestao_arquivistica_hml}
      REDIS_URL:              redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      CELERY_BROKER_URL:      redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/1
      CELERY_RESULT_BACKEND:  redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/2
      S3_ENDPOINT:    http://minio:9000
      CLAMAV_ENABLED: "false"
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - hml_internal

  celery-worker:
    build:
      context: ./backend
      target: production
    image: gaa-backend:homolog
    container_name: hml-celery-worker
    restart: unless-stopped
    env_file:
      - .env.homolog
    environment:
      ENVIRONMENT: homolog
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gestor_hml}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-gestao_arquivistica_hml}
      REDIS_URL:             redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      CELERY_BROKER_URL:     redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/2
    command: celery -A app.tasks worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hml_internal

  celery-beat:
    build:
      context: ./backend
      target: production
    image: gaa-backend:homolog
    container_name: hml-celery-beat
    restart: unless-stopped
    env_file:
      - .env.homolog
    environment:
      ENVIRONMENT: homolog
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gestor_hml}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-gestao_arquivistica_hml}
      REDIS_URL:             redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      CELERY_BROKER_URL:     redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/2
    command: celery -A app.tasks beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hml_internal

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
    image: gaa-frontend:homolog
    container_name: hml-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hml_internal

  nginx:
    image: nginx:1.27-alpine
    container_name: hml-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_BIND:-127.0.0.1:8080:80}"
    volumes:
      - ./deploy/oci/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hml_internal
      - hml_edge

# ─────────────────────────────────────────────────────────────
# VOLUMES — sufixo _hml garante isolamento total da produção.
# NUNCA remova com --volumes ou docker volume rm postgres_data_hml
# sem fazer backup antes.
# ─────────────────────────────────────────────────────────────
volumes:
  postgres_data_hml:
  redis_data_hml:
  minio_data_hml:

networks:
  hml_internal:
    driver: bridge
  hml_edge:
    driver: bridge
