# ===========================================================
# Gestao de Apoio Arquivistico - OCI VM (producao)
# ===========================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: gaa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gestao_arquivistica}
      POSTGRES_USER: ${POSTGRES_USER:-gestor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestor} -d ${POSTGRES_DB:-gestao_arquivistica}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gaa_internal

  redis:
    image: redis:7-alpine
    container_name: gaa-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:?REDIS_PASSWORD is required} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gaa_internal

  minio:
    image: minio/minio:latest
    container_name: gaa-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    # Console restrito ao host da VM (acesso via SSH tunnel, se necessario)
    ports:
      - "127.0.0.1:9001:9001"
    networks:
      - gaa_internal

  clamav:
    image: clamav/clamav:latest
    container_name: gaa-clamav
    restart: unless-stopped
    networks:
      - gaa_internal

  backend:
    build:
      context: ./backend
      target: production
    container_name: gaa-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gestor}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-gestao_arquivistica}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/1
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/2}
      S3_ENDPOINT: http://minio:9000
      CLAMAV_ENABLED: "true"
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      clamav:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gaa_internal

  celery-worker:
    build:
      context: ./backend
      target: production
    container_name: gaa-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gestor}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-gestao_arquivistica}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/1
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/2}
    command: celery -A app.tasks worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gaa_internal

  celery-beat:
    build:
      context: ./backend
      target: production
    container_name: gaa-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gestor}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-gestao_arquivistica}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/1
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/2}
    command: celery -A app.tasks beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gaa_internal

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
    container_name: gaa-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gaa_internal

  nginx:
    image: nginx:1.27-alpine
    container_name: gaa-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_BIND:-80:80}"
    volumes:
      - ./deploy/oci/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - gaa_internal
      - gaa_edge

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  gaa_internal:
    driver: bridge
  gaa_edge:
    driver: bridge
